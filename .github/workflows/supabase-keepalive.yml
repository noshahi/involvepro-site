name: Supabase Keepalive

on:
  schedule:
    - cron: "0 6 */3 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" "https://involvepro-site-production.up.railway.app/api/health")
          echo "Health check responded with $status"
          if [ "$status" != "200" ]; then
            echo "::error::Health check failed with status $status"
            exit 1
          fi
